<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Invenio Test Reports Index</title>
    <link href="https://fonts.googleapis.com/css2?family=Source+Sans+3:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background-color: #f8f9fa;
            font-family: 'Source Sans 3', sans-serif;
        }
        .header-section {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 2rem 0;
            margin-bottom: 2rem;
        }
        .card {
            border: none;
            box-shadow: 0 0.125rem 0.25rem rgba(0, 0, 0, 0.075);
            margin-bottom: 1.5rem;
        }
        .card-header {
            background-color: #f8f9fa;
            border-bottom: 2px solid #dee2e6;
            font-weight: 500;
            font-size: 1.25rem;
            padding: 1rem 1.25rem;
        }
        .table {
            margin-bottom: 0;
        }
        .table th {
            background-color: #e9ecef;
            border-bottom: 2px solid #dee2e6;
            font-weight: 500;
            font-size: 0.875rem;
            text-transform: uppercase;
            color: #495057;
        }
        .emoji-icon {
            font-size: 1.5rem;
            margin-right: 0.5rem;
        }
        .metrics-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 1rem;
            margin-bottom: 2rem;
        }
        .metric-card {
            background: white;
            padding: 1.5rem;
            border-radius: 0.5rem;
            text-align: center;
            border: 2px solid #667eea;
        }
        .metric-value {
            font-size: 2rem;
            font-weight: 600;
            color: #667eea;
        }
        .metric-label {
            font-size: 0.875rem;
            color: #6c757d;
            text-transform: uppercase;
            font-weight: 500;
        }
        .report-link {
            font-weight: 500;
            text-decoration: none;
        }
        .report-link:hover {
            text-decoration: underline;
        }
        .no-reports {
            text-align: center;
            padding: 3rem;
            color: #6c757d;
        }
        .no-reports .emoji {
            font-size: 4rem;
            margin-bottom: 1rem;
        }
        .badge-status {
            font-size: 0.8rem;
        }
        .table tbody tr {
            vertical-align: middle;
        }
        .report-name {
            font-weight: 500;
            color: #212529;
        }
        #reportFilter {
            border: 2px solid #dee2e6;
            padding: 0.75rem;
            font-size: 1rem;
        }
        #reportFilter:focus {
            border-color: #667eea;
            box-shadow: 0 0 0 0.2rem rgba(102, 126, 234, 0.25);
        }
    </style>
</head>
<body>
    <!-- Header -->
    <div class="header-section">
        <div class="container">
            <h1 class="mb-3">📑 Invenio Test Reports Index</h1>
            <p class="mb-1"><em>Last updated: 2026-03-06 11:23:24 UTC</em></p>
        </div>
    </div>

    <div class="container mb-5">
        
        <!-- Reports List -->
        <div class="card">
            <div class="card-header">
                <span class="emoji-icon">📄</span>Available Reports
            </div>
            <div class="card-body">
                <!-- Search/Filter Input -->
                <div class="mb-3">
                    <input type="text" id="reportFilter" class="form-control" placeholder="🔍 Filter reports by name...">
                </div>
                <div class="table-responsive">
                    <table class="table table-hover" id="reportsTable">
                        <thead>
                            <tr>
                                <th>Report Name</th>
                                <th>Last Modified</th>
                                <th class="text-center">✅ OK</th>
                                <th class="text-center">❌ Errors</th>
                            </tr>
                        </thead>
                        <tbody>
                            
                            <tr>
                                <td>
                                    <a href="cds-rdm-2026-03-06-10-57-04/index.html">
                                        <span class="report-name">cds-rdm-2026-03-06-10-57-04</span>
                                    </a>
                                </td>
                                <td>2026-03-06 11:23:23 UTC</td>
                                <td class="text-center">
                                    <span class="badge bg-success">42</span>
                                </td>
                                <td class="text-center">
                                    
                                    <span class="badge bg-danger">12</span>
                                    
                                </td>
                            </tr>
                            
                            <tr>
                                <td>
                                    <a href="cds-rdm-2026-03-05-16-11-08/index.html">
                                        <span class="report-name">cds-rdm-2026-03-05-16-11-08</span>
                                    </a>
                                </td>
                                <td>2026-03-05 16:11:09 UTC</td>
                                <td class="text-center">
                                    <span class="badge bg-success">0</span>
                                </td>
                                <td class="text-center">
                                    
                                    <span class="badge bg-secondary">0</span>
                                    
                                </td>
                            </tr>
                            
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
        
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        // Filter reports by name
        document.getElementById('reportFilter').addEventListener('input', function(e) {
            const filterValue = e.target.value.toLowerCase();
            const table = document.getElementById('reportsTable');
            const rows = table.querySelectorAll('tbody tr');
            
            rows.forEach(row => {
                const reportName = row.querySelector('.report-name').textContent.toLowerCase();
                if (reportName.includes(filterValue)) {
                    row.style.display = '';
                } else {
                    row.style.display = 'none';
                }
            });
        });
    </script>
</body>
</html>
