# Invenio Testrig Workflow
# Tests CDS-RDM against frozen dependencies to verify release readiness
#
# To set up GitHub Pages for test reports (one-time setup):
#   cd /tmp
#   gh repo clone cerndocumentserver/cds-rdm
#   cd cds-rdm
#   git checkout --orphan gh-pages
#   git rm -rf .
#   git commit --allow-empty -m "Initialize gh-pages branch"
#   git push origin gh-pages
#
# To run manually:
#   gh workflow run cds_testrig.yml [--ref your-branch]

name: Run on testrig

on:
  workflow_dispatch:
    inputs:
      reason:
        description: "Reason"
        required: false
        default: "Manual trigger"

permissions:
  contents: write
  id-token: write
  pages: write

jobs:
  verify-patches:
    uses: oarepo/invenio-testrig/.github/workflows/verify-patches.yml@master
    secrets: inherit
    with:
      name: CDS-RDM
      repository: ${{ github.repository }}@${{ github.ref_name }}
      config-file: ${{ github.workspace }}/cds_testrig_config.yaml
      disable-codestyle-checks: true
      python-version: "3.9"
      skip-report: false
      report-repository: ${{ github.repository }}
      report-branch: gh-pages
      report-repository-token: ${{ secrets.GITHUB_TOKEN }}
      ignore-uv-lock: false
      test-scope: all
      test-mode: run-all
